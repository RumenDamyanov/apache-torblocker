# apache-torblocker Example Configuration
#
# Version: 0.1.0
#
# This module controls access from Tor exit nodes.
# Three modes: off (allow all), on (block Tor), only (allow only Tor)
#

LoadModule torblocker_module modules/mod_torblocker.so

# Tor exit list source URL (default: official Tor project)
# TorBlockSourceUrl https://check.torproject.org/torbulkexitlist

# Refresh interval in seconds (default: 3600)
# TorBlockRefreshInterval 3600

<VirtualHost *:80>
    ServerName example.com
    DocumentRoot /var/www/html

    # Block Tor exit nodes for this virtual host
    TorBlock on

    # Allow Tor for anonymous submissions
    <Location /anonymous-tips>
        TorBlock only
    </Location>

    # Disable for status page
    <Location /server-status>
        TorBlock off
    </Location>
</VirtualHost>
