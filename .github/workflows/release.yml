name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag (e.g. v0.1.0) to build"
        required: false
        default: ""
      create_release:
        description: "Create GitHub Release (true/false)"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build-release:
    outputs:
      tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
      version: ${{ steps.resolve_tag.outputs.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag (input or latest)
        id: resolve_tag
        run: |
          set -euo pipefail
          INPUT_TAG='${{ inputs.tag }}'
          if [ -n "$INPUT_TAG" ]; then TAG_NAME="$INPUT_TAG"; else
            git fetch --tags --force
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -z "$TAG_NAME" ]; then echo 'No tag found.' >&2; exit 1; fi
          fi
          git checkout "$TAG_NAME"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Build module
        run: |
          set -euxo pipefail
          docker run --platform=linux/${TARGET_ARCH} --rm -v "$PWD":/workspace -w /workspace ubuntu:25.04 /bin/bash -c "\
            set -euxo pipefail; \
            apt-get update; \
            DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential apache2-dev ca-certificates file curl; \
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y; \
            source ~/.cargo/env; \
            cargo build --release; \
          "

      - name: Package artifact
        run: |
          set -euxo pipefail
          FN_BASE=apache-torblocker_${VERSION}_plucky_${TARGET_ARCH}
          mkdir -p pkg
          cp LICENSE.md README.md CHANGELOG.md pkg/ || true
          cp conf/example.conf pkg/ || true
          cp target/release/libtorblocker.so pkg/mod_torblocker.so || true
          tar czf ${FN_BASE}.tar.gz -C pkg .
          sha256sum ${FN_BASE}.tar.gz >> SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            *.tar.gz
            SHA256SUMS

  publish:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ inputs.create_release == 'true' }}
    steps:
      - name: Checkout for changelog
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Consolidate checksums
        run: find collected -name SHA256SUMS -exec cat {} + | sort -u > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-release.outputs.tag_name }}
          name: ${{ needs.build-release.outputs.tag_name }}
          generate_release_notes: true
          files: |
            collected/**/*.tar.gz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
