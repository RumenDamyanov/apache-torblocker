version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
    open-pull-requests-limit: 2
    reviewers:
      - "RumenDamyanov"
    commit-message:
      prefix: "ci"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "RumenDamyanov"
    commit-message:
      prefix: "deps"
